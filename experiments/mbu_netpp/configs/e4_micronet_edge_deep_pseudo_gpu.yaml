experiment:
  name: e4_micronet_edge_deep_pseudo_gpu
  output_root: C:\Users\pyd111\Desktop\中期\wd_bishe\experiments\mbu_netpp\outputs\e4_micronet_edge_deep_pseudo_gpu
  seed: 42
  save_best_by: dice

data:
  images_dir: C:\Users\pyd111\Desktop\已完成标注图像\全部已完成标注图像_精修底图
  annotations_dir: C:\Users\pyd111\Desktop\已完成标注图像\全部已完成标注图像_精修底图
  prepared_root: C:\Users\pyd111\Desktop\中期\wd_bishe\experiments\mbu_netpp\workdir\prepared_e4_pseudo_mix
  positive_labels:
    - gamma_prime
  num_folds: 3
  fold_seed: 42
  fold_manifest_name: folds_3_seed42.json
  edge_kernel: 3
  auto_prepare: false
  force_prepare: false
  auto_crop_sem_region: false
  crop_detection_ratio: 0.75
  patch_size: 256
  overlap: 0.25
  samples_per_epoch: 160
  normalization: minmax
  preprocess:
    enabled: true
    background:
      method: none
      radius: 25
    denoise:
      method: none
      gaussian_kernel: 3
      median_kernel: 3
    enhance:
      method: clahe
      clahe_clip_limit: 2.0
      clahe_tile_size: 8
    extras:
      unsharp: false
      unsharp_radius: 3
      unsharp_amount: 1.0
  augmentation:
    horizontal_flip_p: 0.5
    vertical_flip_p: 0.5
    rotate90_p: 0.75
    scale_p: 0.3
    scale_limit: 0.1
    brightness_contrast_p: 0.25
    brightness_limit: 0.08
    contrast_limit: 0.08
    gaussian_noise_p: 0.2
    noise_std_limit: 10.0
    min_foreground_ratio: 0.01
    min_edge_ratio: 0.002
    crop_attempts: 12

model:
  name: mbu_netpp
  encoder_name: se_resnext50_32x4d
  encoder_weights_mode: micronet
  micronet_checkpoint: C:\Users\pyd111\Desktop\中期\wd_bishe\experiments\mbu_netpp\workdir\weights\se_resnext50_32x4d_pretrained_microscopynet_v1.0.pth.tar
  in_channels: 1
  classes: 1
  decoder_channels: [256, 128, 64, 32, 16]
  use_edge_head: true
  use_deep_supervision: true

training:
  device: cuda
  batch_size: 2
  num_workers: 0
  epochs: 30
  learning_rate: 0.00005
  weight_decay: 0.0001
  scheduler: cosine
  amp: true
  threshold: 0.5
  boundary_tolerance: 2
  init_checkpoint_template: C:\Users\pyd111\Desktop\中期\wd_bishe\experiments\mbu_netpp\outputs\e2_micronet_edge_deep_gpu\fold_{fold_index}\best.pt

loss:
  use_edge_loss: true
  use_vf_loss: false
  edge_weight: 0.3
  deep_weight: 0.2
  vf_weight: 0.1

inference:
  overlap: 0.25
